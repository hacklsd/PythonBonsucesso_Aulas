<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora para Motoristas</title>
</head>
<body>
    <center>
        <h1>CALCULADORA PARA MOTORISTAS ESPERTOS</h1>
    <hr></hr>
    <form>
    <label>Valor disponível para abastecimento:<br/><br/></label>  
    <input type="number" id="dinheiro"><br/><br/><br/>
</form></center>
    <center><button type="button" onclick="Calculadora()">Calcular</button></center>

    <br/>   

<p id="resultado"></p>


<script>

function Calculadora() {

    //ENTRADA:

    let dinheiro = parseFloat(document.getElementById('dinheiro').value);    
     /* ACIMA EU PEGUEI A RESPOSTA DO USUÁRIO NA CX E JÁ CONVERTI EM NÚMEROS;
 */
    
    // PROCESSAMENTO:

    let litros = dinheiro / 5;
    let distancia = litros * 20;


    // SAÍDA:

    document.getElementById('resultado').innerHTML = 
        "Você pode abastecer " + litros + " litros, " +
        "e percorrer uma distância de  " + distancia +  " km.";

}


</script>
</body>
</html>
