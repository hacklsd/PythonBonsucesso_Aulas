<!DOCTYPE html>
<html lang="pt-pt">

<head>
    <meta charset="UTF-8">
    <title>Status do Servidor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 30px;
            background: #1e1e1e;
            color: #d4d4d4;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            color: #569cd6;
            border-bottom: 1px solid #3c3c3c;
            padding-bottom: 10px;
        }

        .section {
            margin-bottom: 25px;
            background: #252526;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #3c3c3c;
        }

        h2 {
            font-size: 1.1em;
            color: #4ec9b0;
            margin-top: 0;
        }

        pre {
            background: #000;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00;
        }
    </style>
</head>

<body>
    <!--INICIO NAVBAR-->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'home' %}">CRUD DJANGO</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link " aria-current="page" href="{% url 'home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'cadastro' %}">Cadastro</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'usuarios' %}">Usuários</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link activate" href="{% url 'sistema' %}">Sistema</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <!-- FIM NAVBAR-->

    <div class="container">
        <h1>Status do Servidor (Modo: Comando do Sistema)</h1>
        <p>Sistema Operativo Detectado: <strong>{{ sistema }}</strong></p>

        <div class="section">
            <h2>Nome do Servidor</h2>
            <pre>{{ nome_servidor }}</pre>
        </div>

        <div class="section">
            <h2>Processador (CPU)</h2>
            <pre>{{ processador }}</pre>
        </div>

        <div class="section">
            <h2>Memória RAM</h2>
            <pre>{{ memoria }}</pre>
        </div>

        <div class="section">
            <h2>Status de Rede</h2>
            <pre>{{ rede }}</pre>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
