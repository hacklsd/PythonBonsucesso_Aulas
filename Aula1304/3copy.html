<script>

// ENTRADA:
let n1 = parseInt(prompt("Digite o valor do 1º numero: "));
let n2 = parseInt(prompt("Digite o valor do 2º numero: ")); 
// OBS: O comando parseInt serve para traduzir uma informação de texto... 
//      ...em número inteiro, para realizar cálculos


// PROCESSAMENTO:
let soma = n1+n2;
let sub = n1 - n2;
let mult = n1 * n2;
let potencia = n1 ** n2;
//SAÍDA:
document.write("O resultado da soma é: " + soma+ "<br/>");
document.write("O resusltado da subtração é: " + sub+ "<br/>");
document.write(" O resultado da multiplicação é: " + mult+ "<br/>");
document.write("A potencia de "+n1 + "elevado a:" +n2 + "  =  "+potencia+"<br/>");

</script>
