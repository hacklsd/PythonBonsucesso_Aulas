<script>
// Entrada de Dados: 
var nome = "Senac"; // String = Texto
let sobrenome = "Comércio";
let idade = 30; // Inteiro
let salário =  1500.10 // Decimal = Float

// Saída de dados -> Impresão na tela: 
document.write("O nome é: "+nome+"<br/>" + " O Sobrenome é: " + sobrenome+"<br/>"); 
// *o comando "<br/>" serve para o próximo texto ir pra linha de baixo*
document.write("A idade é: "+ idade+ "<br/>");
document.write("Seu Salário é: "+ salário);

</script>
