<script>
             
    /*      1 Fórmula do cálculo da área:
    
          A = π x R²
          área = pi * raio ao quadrado
       
          2 Barra e asterístico serve para fazer um comentário de bloco,
          sem precisar usar barra barra (//) em cada linha, basta adicionar:
      
          barra + asterístico no começo
          asterístico + barra no final
    */

    // --------------------------------------------------------------


    // PROCESSAMENTO: 

    let r = parseInt(prompt("Digite o valor do raio: "));
    
    // PROCESSAMENTO

    let Area = 3.14 * (r ** 2);
    let circunferência = 2 * 3.14 * r;


    // SAÍDA:

    document.write("O valor total da área é:" + Area + "<br/>");
    document.write("A circunferência do círculo é: " + circunferência + "<br/>");






</script>
